<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Zen State</title>
  </head>
  <body>
    <div id="container">
      <span id="status-dot"></span>
      <span id="status-text">Loading..</span>
    </div>
    <script>
      function updateStatus() {
        const now = new Date();
        const hour = now.getHours();
        const day = now.getDay();

        const dot = document.getElementById("status-dot");
        const text = document.getElementById("status-text");

        let status = "";
        let color = "";

        if (day === 6) {
          if (hour >= 10 && hour < 22) {
            status = "Zen is adventuring";
            color = "#00f4ff";
          } else {
            status = "Zen is recharging";
            color = "#ffaa00";
          }
        } else {
          if (hour >= 6 && hour < 10) {
            status = "Zen is studying";
            color = "#ff0000";
          } else if (hour >= 18 && hour < 20) {
            status = "Zen is building worlds";
            color = "#bc13fe";
          } else if (hour >= 22 || hour < 5) {
            status = "Zen is eeping";
            color = "#555";
          } else {
            status = "Zen is rendering a better life";
            color = "#00ff00";
          }
        }

        text.innerText = status;
        dot.style.backgroundColor = color;
        dot.style.color = color;
      }

      updateStatus();
      setInterval(updateStatus, 6000);
    </script>
  </body>
</html>
